<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catur Polyglot - C, Python, JS</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #222; color: white; padding-bottom: 50px; }
        
        #board {
            display: grid;
            grid-template-columns: repeat(8, 12vw);
            grid-template-rows: repeat(8, 12vw);
            border: 5px solid #444;
            margin-top: 20px;
            user-select: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .square {
            width: 12vw;
            height: 12vw;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8vw;
            cursor: pointer;
            transition: 0.1s;
        }

        .white { background-color: #f0d9b5; }
        .black { background-color: #b58863; }
        
        .selected {
            background-color: #769656 !important;
            box-shadow: inset 0 0 10px rgba(255,255,255,0.5);
        }

        #info { 
            margin-top: 20px; 
            padding: 15px; 
            background: #333; 
            border-radius: 8px; 
            width: 90%; 
            max-width: 400px;
            text-align: center; 
        }

        h2 { margin-top: 20px; color: #f0d9b5; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <h2>Catur Polyglot</h2>
    
    <div id="board"></div>

    <div id="info">
        <p id="status">Pilih bidak untuk memulai</p>
    </div>
    <script>
        const boardElement = document.getElementById('board');
        const statusElement = document.getElementById('status');

        let selectedSquare = null;

        const pieces = [
            ['r','n','b','q','k','b','n','r'],
            ['p','p','p','p','p','p','p','p'],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['P','P','P','P','P','P','P','P'],
            ['R','N','B','Q','K','B','N','R']
        ];

        const pieceIcons = {
            'r': '♜', 'n': '♞', 'b': '♝', 'q': '♛', 'k': '♚', 'p': '♟',
            'R': '♖', 'N': '♘', 'B': '♗', 'Q': '♕', 'K': '♔', 'P': '♙'
        };

        function renderBoard() {
            boardElement.innerHTML = '';
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const square = document.createElement('div');
                    square.className = `square ${(r + c) % 2 === 0 ? 'white' : 'black'}`;
                    
                    const piece = pieces[r][c];
                    if (piece) square.innerText = pieceIcons[piece];
                    if (selectedSquare && selectedSquare.r === r && selectedSquare.c === c) square.classList.add('selected');

                    square.onclick = () => handleSquareClick(r, c);
                    boardElement.appendChild(square);
                }
            }
        }

        async function handleSquareClick(r, c) {
            const targetPiece = pieces[r][c];

            if (!selectedSquare) {
                if (targetPiece) {
                    selectedSquare = { r, c, piece: targetPiece };
                    statusElement.innerText = `Memilih ${pieceIcons[targetPiece]}. Klik tujuan!`;
                    renderBoard();
                }
            } else {
                if (selectedSquare.r === r && selectedSquare.c === c) {
                    selectedSquare = null;
                    statusElement.innerText = "Batal pilih.";
                    renderBoard();
                    return;
                }

                try {
                    // --- PERBAIKAN LOGIKA: KONVERSI PAPAN KE STRING ---
                    // Mengubah array 2D menjadi string 64 karakter (kosong jadi spasi)
                    const boardString = pieces.flat().map(p => p === '' ? ' ' : p).join('');

                    // Kirim semua data: bidak, koordinat, target, dan kondisi papan
                    const url = `http://localhost:5000/validate?piece=${selectedSquare.piece}&x1=${selectedSquare.r}&y1=${selectedSquare.c}&x2=${r}&y2=${c}&target=${targetPiece || ' '}&board=${encodeURIComponent(boardString)}`;
                    
                    const res = await fetch(url);
                    const data = await res.json();

                    if (data.valid) {
                        pieces[r][c] = selectedSquare.piece;
                        pieces[selectedSquare.r][selectedSquare.c] = '';
                        statusElement.innerText = targetPiece ? `Berhasil memakan ${pieceIcons[targetPiece]}!` : `Gerakan Berhasil!`;
                    } else {
                        statusElement.innerText = `Ilegal! Engine C melarang gerakan ini.`;
                    }
                } catch (err) {
                    statusElement.innerText = "Gagal terhubung ke Backend Python!";
                }

                selectedSquare = null;
                renderBoard();
            }
        }

        renderBoard();
    </script>

</body>
</html>
